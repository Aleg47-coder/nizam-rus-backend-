# ─────────────────────────────────────────────────────────────────────────────
# Nginx configuration for NIZAM-RUS
# ─────────────────────────────────────────────────────────────────────────────
#
# SETUP:
#   1. Install nginx:             sudo apt install nginx
#   2. Copy this file:            sudo cp nginx.conf /etc/nginx/sites-available/nizam-rus
#   3. Enable the site:           sudo ln -s /etc/nginx/sites-available/nizam-rus /etc/nginx/sites-enabled/
#   4. Remove the default site:   sudo rm /etc/nginx/sites-enabled/default
#   5. Test config:               sudo nginx -t
#   6. Reload nginx:              sudo systemctl reload nginx
#
# SSL (HTTPS) — run after the above:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com
#   Certbot will edit this file automatically to add SSL config.
# ─────────────────────────────────────────────────────────────────────────────

# Upstream = our FastAPI app running on localhost:8000
# Gunicorn manages multiple uvicorn worker processes on this socket.
upstream nizam_rus_api {
    server 127.0.0.1:8000;
    keepalive 64;                   # Reuse connections to the backend (performance)
}

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;   # ← Replace with your domain

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"     always;
    add_header X-Frame-Options         "DENY"        always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Define in the http {} block of /etc/nginx/nginx.conf:
    #   limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    #   limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    #
    # Applied per-location below.

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/nizam-rus-access.log;
    error_log  /var/log/nginx/nizam-rus-error.log;

    # ── Serve the static HTML frontend ───────────────────────────────────────
    # Put your built HTML in /var/www/nizam-rus/
    root /var/www/nizam-rus;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # SPA fallback
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Static assets — cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Auth endpoints — tighter rate limit ───────────────────────────────────
    # Prevents brute-force login and registration spam.
    location ~ ^/api/auth/(login|register|resend-verification) {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://nizam_rus_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── All other API routes ──────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://nizam_rus_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeout settings (generous for slow queries)
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Buffer settings for API responses
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }

    # ── Health check endpoint (no rate limit, used by load balancers) ─────────
    location /health {
        proxy_pass http://nizam_rus_api;
        access_log off;             # Don't spam logs with health checks
    }

    # ── Block common attack vectors ───────────────────────────────────────────
    location ~ /\. {
        deny all;                   # Hide .env, .git, etc.
    }
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }

    # Maximum request body size (adjust for file uploads if you add them later)
    client_max_body_size 2M;
}

# Redirect www → non-www (optional — pick one canonical domain)
# server {
#     listen 80;
#     server_name www.yourdomain.com;
#     return 301 https://yourdomain.com$request_uri;
# }
