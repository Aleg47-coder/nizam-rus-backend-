[pytest]
# ── Test discovery ────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Async mode ────────────────────────────────────────────────────────────────
asyncio_mode = auto

# ── Output ────────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --no-header

# ── Warnings ──────────────────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
